name: Update Kindle Heatmap

on:
  schedule:
    - cron: "30 22 * * 1-5"
    - cron: "30 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install yfinance matplotlib pillow numpy

      - name: 运行截图脚本
        run: python scripts/capture_heatmap.py

      - name: 提交并推送更新
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update heatmap $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
